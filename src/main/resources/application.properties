# Server Configuration
server.port=${PORT:8080}
server.error.include-message=always
server.error.include-binding-errors=always

# PostgreSQL Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool settings for AWS RDS
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# JWT Configuration
jwt.secret=${JWT_SECRET:mySecretKeyForJWTTokenGenerationAndValidation2024CarDealershipMustBeAtLeast32Chars!}
jwt.expiration=${JWT_EXPIRATION:604800000}

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging
logging.level.org.springframework.security=INFO
logging.level.com.Shubham.carDealership=DEBUG
logging.level.org.springframework.web=INFO

# OpenAI API Configuration
openai.api.key=${OPENAI_API_KEY:}
openai.model=gpt-4o-mini
openai.max-tokens=500
openai.temperature=0.7

# ML Services Configuration
ml.carrecognition.url=${ML_CARRECOGNITION_URL:https://car-recognition-ml.onrender.com}
ml.carrecognition.enabled=true
ml.tradein.url=${ML_TRADEIN_URL:https://tradein-ml.onrender.com}
ml.tradein.enabled=true

# Payment Configuration
payment.mode=mock

# CORS Configuration
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:https://dealership.shubhamkataria.com,http://localhost:5173,http://localhost:3000}

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Pinecone
pinecone.api.key=${PINECONE_API_KEY:}
pinecone.index.url=${PINECONE_INDEX_URL:}

# ?? Email (Brevo SMTP relay) ??????????????????????????????????????????
# BREVO_SMTP_LOGIN and BREVO_SMTP_KEY must be set as real environment
# variables on your host (Elastic Beanstalk / Render config) ? never
# hardcode the SMTP key directly in this file or commit it to git.
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.username=${BREVO_SMTP_LOGIN}
spring.mail.password=${BREVO_SMTP_KEY}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000

# The verified Brevo sender ? defaults match what you just verified, but
# can be overridden via env var without a code change (e.g. once you set
# up a bookings@shubhamkataria.com forwarding address later).
mail.from.address=${MAIL_FROM_ADDRESS:katariashubham0101@gmail.com}
mail.from.name=${MAIL_FROM_NAME:Shubham's Car Dealership}