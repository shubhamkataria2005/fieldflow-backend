# backend/src/main/resources/application.properties
# Server Configuration
server.port=${PORT:8080}
server.error.include-message=always
server.error.include-binding-errors=always

# PostgreSQL Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# JWT Configuration
jwt.secret=${JWT_SECRET:mySecretKeyForJWTTokenGenerationAndValidation2024CarDealershipMustBeAtLeast32Chars!}
jwt.expiration=${JWT_EXPIRATION:604800000}

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging
logging.level.org.springframework.security=INFO
logging.level.com.Shubham.carDealership=DEBUG
logging.level.org.springframework.web=INFO

# OpenAI API Configuration
openai.api.key=${OPENAI_API_KEY:}
openai.model=gpt-3.5-turbo
openai.max-tokens=500
openai.temperature=0.7

# ML Services Configuration
ml.carrecognition.url=${ML_CARRECOGNITION_URL:https://car-recognition-ml.onrender.com}
ml.carrecognition.enabled=true

ml.tradein.url=${ML_TRADEIN_URL:https://tradein-ml.onrender.com}
ml.tradein.enabled=true

# Payment Configuration
payment.mode=mock

# CORS Configuration - Add your frontend URL
cors.allowed.origins=https://ai-car-dealership-frontend.onrender.com,http://localhost:5173,http://localhost:3000

# Actuator endpoints for health checks
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

